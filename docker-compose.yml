version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: talentiq-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: talentiq

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talentiq-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/talentiq
      JWT_SECRET: change_this_to_a_strong_secret_key_in_production
      REFRESH_TOKEN_SECRET: change_this_refresh_token_secret_too
      CLIENT_URL: http://localhost:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - mongodb
    volumes:
      - ./data:/app/data:ro
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talentiq-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_uploads:
  backend_logs:
